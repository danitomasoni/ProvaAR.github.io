<!DOCTYPE html>
<html lang="it">
<head>
    <title>BIM AR PRO V3.1 - Grey Default</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
        #ar-overlay { width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        #status-panel { 
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            width: 80%; text-align: center; z-index: 9999;
            background: rgba(0,0,0,0.7); color: white; padding: 10px; border-radius: 8px;
            pointer-events: none;
        }

        #info-popup {
            position: absolute; top: 100px; left: 50%; transform: translateX(-50%);
            width: 80%; background: rgba(0,0,0,0.85); color: #fff; padding: 15px;
            border-radius: 12px; display: none; border: 1px solid #007bff; pointer-events: auto;
            z-index: 9999;
        }

        #ui-controls { 
            position: absolute; bottom: 30px; width: 100%; text-align: center; 
            pointer-events: none; z-index: 9999;
        }

        .btn { 
            background: #007bff; color: white; border: none; padding: 15px 25px; 
            border-radius: 12px; font-weight: bold; pointer-events: auto; margin: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        #opacity-container {
            position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%);
            width: 80%; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 50px;
            display: none; pointer-events: auto; align-items: center; z-index: 9999;
        }

        input[type=range] { width: 100%; cursor: pointer; }

        .btn-reset { background: #dc3545; margin-top: 10px; width: 100%; }
    </style>
</head>
<body>

    <div id="ar-overlay">
        <div id="status-panel"><div id="status-text">Caricamento Modello...</div></div>

        <div id="info-popup">
            <b id="el-name">Elemento</b><hr>
            <div id="el-data" style="max-height: 200px; overflow-y: auto; font-size: 0.9em;"></div>
            <button class="btn btn-reset" onclick="resetSelection()">CHIUDI</button>
        </div>

        <div id="opacity-container">
            <span style="color:white; margin-right:15px; font-weight:bold; font-size: 0.8em;">OPACITÀ</span>
            <input type="range" id="slider-opacity" min="0" max="1" step="0.01" value="1">
        </div>

        <div id="ui-controls">
            <button id="btn-p1" class="btn" style="background:#28a745">FISSA PUNTO 1 (QR1)</button>
            <button id="btn-p2" class="btn" style="background:#28a745; display:none;">FISSA PUNTO 2 (QR2)</button>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.157.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.157.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        let scene, camera, renderer, model, reticle, raycaster;
        let hitTestSource = null;
        let hitTestSourceRequested = false;
        let p1_digital = new THREE.Vector3(), p2_digital = new THREE.Vector3();
        let p1_real = null, p2_real = null;
        
        let selectedObject = null;
        let originalEmissive = new THREE.Color();

        const statusText = document.getElementById('status-text');
        const infoPopup = document.getElementById('info-popup');
        const opacityUI = document.getElementById('opacity-container');
        const sliderOpacity = document.getElementById('slider-opacity');
        const btnP1 = document.getElementById('btn-p1');
        const btnP2 = document.getElementById('btn-p2');

        init();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 100);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            const arBtn = ARButton.createButton(renderer, {
                requiredFeatures: ['hit-test'],
                optionalFeatures: ['dom-overlay'],
                domOverlay: { root: document.getElementById('ar-overlay') }
            });
            document.body.appendChild(arBtn);

            // Luci potenziate per il grigio
            scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.5));
            const light = new THREE.DirectionalLight(0xffffff, 0.5);
            light.position.set(1, 1, 1);
            scene.add(light);

            raycaster = new THREE.Raycaster();

            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.08, 0.11, 32).rotateX(-Math.PI / 2),
                new THREE.MeshBasicMaterial({ color: 0xccff00 })
            );
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            // Definizione del materiale Grigio Standard
            const defaultGreyMaterial = new THREE.MeshStandardMaterial({
                color: 0xcccccc,      // Grigio chiaro
                roughness: 0.7,       // Non lucido
                metalness: 0.2,       // Poco metallico
                transparent: true,    // Abilita trasparenza per slider
                opacity: 1.0,
                side: THREE.DoubleSide // Visibile da entrambi i lati
            });

            new GLTFLoader().load('./modello.glb?v=' + Date.now(), (gltf) => {
                model = gltf.scene;
                model.traverse(c => {
                    if (c.name === 'QR_CODE1') c.getWorldPosition(p1_digital);
                    if (c.name === 'QR_CODE2') c.getWorldPosition(p2_digital);
                    
                    if (c.isMesh) {
                        // SOVRASCRIVI MATERIALE CON GRIGIO DEFAULT
                        // Copiamo solo il nome per mantenere il riferimento se necessario
                        const oldName = c.material.name;
                        c.material = defaultGreyMaterial.clone(); 
                        c.material.name = oldName;
                    }
                });
                model.visible = false;
                scene.add(model);
                statusText.innerText = "Modello Grigio Caricato. START AR";
            });

            sliderOpacity.oninput = () => {
                const alpha = parseFloat(sliderOpacity.value);
                model.traverse(c => {
                    if (c.isMesh) c.material.opacity = alpha;
                });
            };

            window.addEventListener('click', onSelect);

            btnP1.onclick = () => { if(reticle.visible) { p1_real = new THREE.Vector3().setFromMatrixPosition(reticle.matrix); btnP1.style.display='none'; btnP2.style.display='inline-block'; statusText.innerText="QR1 OK. Vai al QR2"; }};
            btnP2.onclick = () => { if(reticle.visible) { p2_real = new THREE.Vector3().setFromMatrixPosition(reticle.matrix); calibrate(); btnP2.style.display='none'; opacityUI.style.display='flex'; statusText.innerText="Allineato!"; }};

            renderer.setAnimationLoop(render);
        }

        function onSelect(event) {
            if (!model || !model.visible) return;
            const mouse = new THREE.Vector2((event.clientX / window.innerWidth) * 2 - 1, -(event.clientY / window.innerHeight) * 2 + 1);
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(model.children, true);
            if (intersects.length > 0) {
                const target = intersects[0].object;
                if (selectedObject) resetSelection();
                selectedObject = target;
                if(selectedObject.material.emissive) {
                    selectedObject.material.emissive.setHex(0xff0000); // Rosso per evidenziare sul grigio
                }
                showPopup(target);
            }
        }

        window.resetSelection = function() {
            if (selectedObject && selectedObject.material.emissive) {
                selectedObject.material.emissive.setHex(0x000000);
            }
            selectedObject = null;
            infoPopup.style.display = 'none';
        }

        function showPopup(obj) {
            document.getElementById('el-name').innerText = obj.name || "Elemento";
            let dataStr = "";
            if(obj.userData) {
                for (const [key, value] of Object.entries(obj.userData)) {
                    if(typeof value !== 'object') dataStr += `<b>${key}:</b> ${value}<br>`;
                }
            }
            document.getElementById('el-data').innerHTML = dataStr || "Nessun metadato.";
            infoPopup.style.display = 'block';
        }

        function calibrate() {
            const scale = p1_real.distanceTo(p2_real) / p1_digital.distanceTo(p2_digital);
            model.scale.setScalar(scale);
            const angle = Math.atan2(p2_real.x - p1_real.x, p2_real.z - p1_real.z) - Math.atan2(p2_digital.x - p1_digital.x, p2_digital.z - p1_digital.z);
            model.rotation.y = angle;
            const offset = p1_digital.clone().multiplyScalar(scale).applyQuaternion(model.quaternion);
            model.position.copy(p1_real).sub(offset);
            model.visible = true;
        }

        function render(timestamp, frame) {
            if (frame) {
                const session = renderer.xr.getSession();
                const referenceSpace = renderer.xr.getReferenceSpace();
                if (!hitTestSourceRequested) {
                    session.requestReferenceSpace('viewer').then(refSpace => {
                        session.requestHitTestSource({ space: refSpace }).then(source => hitTestSource = source);
                    });
                    hitTestSourceRequested = true;
                }
                if (hitTestSource) {
                    const results = frame.getHitTestResults(hitTestSource);
                    if (results.length > 0) {
                        reticle.visible = true;
                        reticle.matrix.fromArray(results[0].getPose(referenceSpace).transform.matrix);
                    } else {
                        reticle.visible = false;
                    }
                }
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
