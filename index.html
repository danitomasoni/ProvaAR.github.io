<!DOCTYPE html>
<html lang="it">
<head>
    <title>AR BIM - Mirino di Precisione</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; color: white; }
        #status-panel { 
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            width: 80%; text-align: center; z-index: 1000; 
            background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px;
        }
        #ui-container { position: absolute; bottom: 30px; width: 100%; text-align: center; z-index: 1000; }
        .btn { 
            background: #28a745; color: white; border: none; padding: 20px; 
            border-radius: 10px; font-weight: bold; font-size: 16px; display: none;
        }
    </style>
</head>
<body>
    <div id="status-panel"><div id="status-text">Caricamento...</div></div>
    
    <div id="ui-container">
        <button id="btn-ar" class="btn">ENTRA IN AR</button>
        <button id="btn-p1" class="btn">FISSA PUNTO 1 (QR1)</button>
        <button id="btn-p2" class="btn">FISSA PUNTO 2 (QR2)</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.150.1/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        let scene, camera, renderer, model, reticle;
        let hitTestSource = null;
        let hitTestSourceRequested = false;
        
        let p1_digital = new THREE.Vector3();
        let p2_digital = new THREE.Vector3();
        let p1_real = null, p2_real = null;

        const statusText = document.getElementById('status-text');
        const btnAR = document.getElementById('btn-ar');
        const btnP1 = document.getElementById('btn-p1');
        const btnP2 = document.getElementById('btn-p2');

        init();

        async function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 100);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Luce
            scene.add(new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1));

            // 1. MIRINO (Il cerchietto che segue il pavimento)
            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.08, 0.1, 32).rotateX(-Math.PI / 2),
                new THREE.MeshBasicMaterial({ color: 0x00ff00 })
            );
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            // 2. CARICA MODELLO
            const loader = new GLTFLoader();
            loader.load('./modello.glb', (gltf) => {
                model = gltf.scene;
                model.traverse(c => {
                    if (c.name.includes('QR_CODE1')) c.getWorldPosition(p1_digital);
                    if (c.name.includes('QR_CODE2')) c.getWorldPosition(p2_digital);
                });
                model.visible = false;
                scene.add(model);
                statusText.innerText = "Modello Pronto. Clicca ENTRA IN AR.";
                btnAR.style.display = 'inline-block';
            });

            btnAR.onclick = () => {
                navigator.xr.requestSession('immersive-ar', { requiredFeatures: ['hit-test'] })
                .then(s => {
                    renderer.xr.setSession(s);
                    btnAR.style.display = 'none';
                    btnP1.style.display = 'inline-block';
                    statusText.innerText = "Punta il mirino sul QR 1";
                });
            };

            // 3. LOGICA PULSANTI FISSA
            btnP1.onclick = () => {
                if (reticle.visible) {
                    p1_real = new THREE.Vector3().setFromMatrixPosition(reticle.matrix);
                    btnP1.style.display = 'none';
                    btnP2.style.display = 'inline-block';
                    statusText.innerText = "Punto 1 OK. Punta il mirino sul QR 2";
                }
            };

            btnP2.onclick = () => {
                if (reticle.visible) {
                    p2_real = new THREE.Vector3().setFromMatrixPosition(reticle.matrix);
                    calibrate();
                    btnP2.style.display = 'none';
                    statusText.innerText = "Allineamento Completato!";
                    reticle.visible = false; // Nascondi il mirino alla fine
                }
            };

            renderer.setAnimationLoop(render);
        }

        function calibrate() {
            const d_dig = p1_digital.distanceTo(p2_digital);
            const d_real = p1_real.distanceTo(p2_real);
            const s = d_real / d_dig;
            model.scale.setScalar(s);

            const v_dig = new THREE.Vector3().subVectors(p2_digital, p1_digital).normalize();
            const v_real = new THREE.Vector3().subVectors(p2_real, p1_real).normalize();
            model.rotation.y = Math.atan2(v_real.x, v_real.z) - Math.atan2(v_dig.x, v_dig.z);

            const offset = p1_digital.clone().multiplyScalar(s).applyQuaternion(model.quaternion);
            model.position.copy(p1_real).sub(offset);
            model.visible = true;
        }

        function render(timestamp, frame) {
            if (frame) {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const session = renderer.xr.getSession();

                if (hitTestSourceRequested === false) {
                    session.requestReferenceSpace('viewer').then(refSpace => {
                        session.requestHitTestSource({ space: refSpace }).then(source => hitTestSource = source);
                    });
                    hitTestSourceRequested = true;
                }

                if (hitTestSource) {
                    const hitTestResults = frame.getHitTestResults(hitTestSource);
                    if (hitTestResults.length) {
                        const hit = hitTestResults[0];
                        reticle.visible = true;
                        reticle.matrix.fromArray(hit.getPose(referenceSpace).transform.matrix);
                    } else {
                        reticle.visible = false;
                    }
                }
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
