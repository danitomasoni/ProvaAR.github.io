<!DOCTYPE html>
<html lang="it">
<head>
    <title>BIM AR PRO V2 - Ispezione & Sezioni</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
        #ar-overlay { width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        /* Pannello Info Elemento */
        #info-popup {
            position: absolute; top: 100px; left: 50%; transform: translateX(-50%);
            width: 80%; background: rgba(0,0,0,0.85); color: #fff; padding: 15px;
            border-radius: 12px; display: none; border: 1px solid #007bff; pointer-events: auto;
        }

        #ui-controls { 
            position: absolute; bottom: 30px; width: 100%; text-align: center; 
            pointer-events: none; 
        }

        .btn { 
            background: #007bff; color: white; border: none; padding: 15px 25px; 
            border-radius: 12px; font-weight: bold; pointer-events: auto; margin: 5px;
        }

        #section-container {
            position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%);
            width: 80%; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 50px;
            display: none; pointer-events: auto; align-items: center;
        }

        input[type=range] { width: 100%; cursor: pointer; }

        .btn-reset { background: #dc3545; }
    </style>
</head>
<body>

    <div id="ar-overlay">
        <div id="info-popup">
            <b id="el-name">Elemento</b><br>
            <small id="el-data">Dati non disponibili</small><br><br>
            <button class="btn btn-reset" onclick="resetSelection()">Chiudi / Reset</button>
        </div>

        <div id="section-container">
            <span style="color:white; margin-right:10px;">Sezione</span>
            <input type="range" id="slider-clip" min="0" max="10" step="0.1" value="0">
        </div>

        <div id="ui-controls">
            <button id="btn-p1" class="btn" style="background:#28a745">FISSA PUNTO 1</button>
            <button id="btn-p2" class="btn" style="background:#28a745; display:none;">FISSA PUNTO 2</button>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.157.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.157.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        let scene, camera, renderer, model, reticle, raycaster;
        let hitTestSource = null;
        let hitTestSourceRequested = false;
        let p1_digital = new THREE.Vector3(), p2_digital = new THREE.Vector3();
        let p1_real = null, p2_real = null;
        
        // Clipping & Selection
        let localPlane, originalMaterials = new Map();
        let selectedObject = null;

        const infoPopup = document.getElementById('info-popup');
        const sectionUI = document.getElementById('section-container');
        const sliderClip = document.getElementById('slider-clip');
        const btnP1 = document.getElementById('btn-p1');
        const btnP2 = document.getElementById('btn-p2');

        init();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 100);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            renderer.localClippingEnabled = true; // ABILITA SEZIONI
            document.body.appendChild(renderer.domElement);

            // Piano di sezione (inizialmente lontanissimo)
            localPlane = new THREE.Plane(new THREE.Vector3(0, 0, -1), 100);

            const arBtn = ARButton.createButton(renderer, {
                requiredFeatures: ['hit-test'],
                optionalFeatures: ['dom-overlay'],
                domOverlay: { root: document.getElementById('ar-overlay') }
            });
            document.body.appendChild(arBtn);

            scene.add(new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1));
            
            raycaster = new THREE.Raycaster();

            // Mirino
            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.08, 0.11, 32).rotateX(-Math.PI / 2),
                new THREE.MeshBasicMaterial({ color: 0xccff00 })
            );
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            // Caricamento
            new GLTFLoader().load('./modello.glb?v=' + Date.now(), (gltf) => {
                model = gltf.scene;
                model.traverse(c => {
                    if (c.name === 'QR_CODE1') c.getWorldPosition(p1_digital);
                    if (c.name === 'QR_CODE2') c.getWorldPosition(p2_digital);
                    
                    // Prepara i materiali per il clipping
                    if (c.isMesh) {
                        c.material.clippingPlanes = [ localPlane ];
                        c.material.clipShadows = true;
                        c.material.side = THREE.DoubleSide; // Per vedere l'interno dei muri tagliati
                    }
                });
                model.visible = false;
                scene.add(model);
            });

            // Evento Click/Touch per selezione
            window.addEventListener('click', onSelect);

            // Gestione pulsanti punti
            btnP1.onclick = () => { if(reticle.visible) { p1_real = new THREE.Vector3().setFromMatrixPosition(reticle.matrix); btnP1.style.display='none'; btnP2.style.display='inline-block'; }};
            btnP2.onclick = () => { if(reticle.visible) { p2_real = new THREE.Vector3().setFromMatrixPosition(reticle.matrix); calibrate(); btnP2.style.display='none'; sectionUI.style.display='flex'; }};

            renderer.setAnimationLoop(render);
        }

        function onSelect(event) {
            if (!model.visible) return;
            
            // Coordinate mouse/touch
            const mouse = new THREE.Vector2(
                (event.clientX / window.innerWidth) * 2 - 1,
                -(event.clientY / window.innerHeight) * 2 + 1
            );

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(model.children, true);

            if (intersects.length > 0) {
                const target = intersects[0].object;
                highlightObject(target);
                showPopup(target);
            }
        }

        function highlightObject(obj) {
            resetSelection(); // Pulisce vecchia selezione
            selectedObject = obj;
            
            // Salva originale e colora di giallo trasparente
            if (!originalMaterials.has(obj.uuid)) {
                originalMaterials.set(obj.uuid, { 
                    color: obj.material.color.clone(),
                    emissive: obj.material.emissive ? obj.material.emissive.clone() : new THREE.Color(0,0,0)
                });
            }
            obj.material.emissive.setHex(0x555500); // Giallo soffuso
        }

        window.resetSelection = function() {
            if (selectedObject) {
                const orig = originalMaterials.get(selectedObject.uuid);
                selectedObject.material.emissive.copy(orig.emissive);
                selectedObject = null;
            }
            infoPopup.style.display = 'none';
        }

        function showPopup(obj) {
            document.getElementById('el-name').innerText = obj.name || "Elemento BIM";
            // Estrae dati se presenti (es. dall'IFC)
            let dataStr = "";
            if(obj.userData) {
                for (const [key, value] of Object.entries(obj.userData)) {
                    if(typeof value !== 'object') dataStr += `<b>${key}:</b> ${value}<br>`;
                }
            }
            document.getElementById('el-data').innerHTML = dataStr || "Nessun metadato trovato.";
            infoPopup.style.display = 'block';
        }

        function updateClipping() {
            const dist = parseFloat(sliderClip.value);
            if (dist === 0) {
                localPlane.constant = 100; // Piano rimosso
            } else {
                // Posiziona il piano davanti alla camera
                const cameraDir = new THREE.Vector3();
                camera.getWorldDirection(cameraDir);
                localPlane.normal.copy(cameraDir).negate();
                
                // La costante è la distanza lungo la normale
                localPlane.constant = - (camera.position.dot(localPlane.normal) + dist);
            }
        }

        function calibrate() {
            const scale = p1_real.distanceTo(p2_real) / p1_digital.distanceTo(p2_digital);
            model.scale.setScalar(scale);
            const angle = Math.atan2(p2_real.x - p1_real.x, p2_real.z - p1_real.z) - Math.atan2(p2_digital.x - p1_digital.x, p2_digital.z - p1_digital.z);
            model.rotation.y = angle;
            const offset = p1_digital.clone().multiplyScalar(scale).applyQuaternion(model.quaternion);
            model.position.copy(p1_real).sub(offset);
            model.visible = true;
        }

        function render(timestamp, frame) {
            if (frame) {
                const session = renderer.xr.getSession();
                const referenceSpace = renderer.xr.getReferenceSpace();
                if (!hitTestSourceRequested) {
                    session.requestReferenceSpace('viewer').then(refSpace => {
                        session.requestHitTestSource({ space: refSpace }).then(source => hitTestSource = source);
                    });
                    hitTestSourceRequested = true;
                }
                if (hitTestSource) {
                    const results = frame.getHitTestResults(hitTestSource);
                    if (results.length > 0) {
                        reticle.visible = true;
                        reticle.matrix.fromArray(results[0].getPose(referenceSpace).transform.matrix);
                    } else {
                        reticle.visible = false;
                    }
                }
                updateClipping();
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
