<!DOCTYPE html>
<html lang="it">
<head>
    <title>BIM AR PRO V4.1 - Fix UI</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
        #ar-overlay { width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        #status-panel { 
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            width: 85%; text-align: center; z-index: 9999;
            background: rgba(0,0,0,0.75); color: white; padding: 12px; border-radius: 10px;
            pointer-events: none; border: 1px solid #444;
        }

        #info-popup {
            position: absolute; top: 100px; left: 50%; transform: translateX(-50%);
            width: 80%; background: rgba(0,0,0,0.9); color: #fff; padding: 15px;
            border-radius: 12px; display: none; border: 1px solid #007bff; 
            pointer-events: auto; /* IMPORTANTE */
            z-index: 10000;
        }

        #ui-controls { 
            position: absolute; bottom: 30px; width: 100%; text-align: center; 
            pointer-events: none; z-index: 9999;
        }

        .btn { 
            background: #007bff; color: white; border: none; padding: 18px 28px; 
            border-radius: 12px; font-weight: bold; pointer-events: auto; margin: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); font-size: 16px;
        }

        .slider-card {
            background: rgba(0,0,0,0.8); padding: 15px; border-radius: 20px;
            width: 85%; margin: 10px auto; pointer-events: auto;
            display: flex; flex-direction: column; gap: 10px;
        }

        .slider-row { display: flex; align-items: center; color: white; font-size: 0.8em; font-weight: bold; }
        .slider-row span { width: 80px; text-align: left; }
        input[type=range] { flex-grow: 1; cursor: pointer; }

        #controls-container {
            position: absolute; bottom: 100px; left: 0; width: 100%;
            display: none; flex-direction: column; align-items: center;
        }
    </style>
</head>
<body>

    <div id="ar-overlay">
        <div id="status-panel"><div id="status-text">Caricamento Modello...</div></div>

        <div id="info-popup">
            <b id="el-name">Elemento</b><hr>
            <div id="el-data" style="max-height: 200px; overflow-y: auto; font-size: 0.9em;"></div>
            <button class="btn" style="background:#dc3545; width:100%;" 
                    onclick="event.stopPropagation(); resetSelection();">CHIUDI</button>
        </div>

        <div id="controls-container">
            <div class="slider-card">
                <div class="slider-row">
                    <span>OPACITÀ</span>
                    <input type="range" id="slider-opacity" min="0" max="1" step="0.01" value="1">
                </div>
                <div class="slider-row" id="row-rotation">
                    <span>ROTAZIONE</span>
                    <input type="range" id="slider-rotation" min="0" max="6.28" step="0.01" value="0">
                </div>
            </div>
            <button id="btn-confirm" class="btn" style="background:#28a745; width: 85%;" 
                    onclick="event.stopPropagation();">CONFERMA POSIZIONE</button>
        </div>

        <div id="ui-controls">
            <button id="btn-p1" class="btn" style="background:#28a745">FISSA PUNTO (QR1)</button>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.157.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.157.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        let scene, camera, renderer, model, reticle, raycaster;
        let hitTestSource = null, hitTestSourceRequested = false;
        let p1_digital = new THREE.Vector3(), p1_real = null;
        let selectedObject = null, originalEmissive = new THREE.Color();

        const statusText = document.getElementById('status-text');
        const infoPopup = document.getElementById('info-popup');
        const controlsContainer = document.getElementById('controls-container');
        const rowRotation = document.getElementById('row-rotation');
        const sliderOpacity = document.getElementById('slider-opacity');
        const sliderRotation = document.getElementById('slider-rotation');
        const btnP1 = document.getElementById('btn-p1');
        const btnConfirm = document.getElementById('btn-confirm');

        init();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 100);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            document.body.appendChild(ARButton.createButton(renderer, {
                requiredFeatures: ['hit-test'],
                optionalFeatures: ['dom-overlay'],
                domOverlay: { root: document.getElementById('ar-overlay') }
            }));

            scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.5));
            raycaster = new THREE.Raycaster();

            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.08, 0.11, 32).rotateX(-Math.PI / 2),
                new THREE.MeshBasicMaterial({ color: 0xccff00 })
            );
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            const greyMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.7, metalness: 0.2, transparent: true, opacity: 1.0, side: THREE.DoubleSide });

            new GLTFLoader().load('./modello.glb?v=' + Date.now(), (gltf) => {
                model = gltf.scene;
                model.traverse(c => {
                    if (c.name === 'QR_CODE1') c.getWorldPosition(p1_digital);
                    if (c.isMesh) c.material = greyMat.clone();
                });
                model.visible = false;
                scene.add(model);
                statusText.innerText = "Modello pronto. START AR";
            });

            sliderOpacity.oninput = () => {
                const alpha = parseFloat(sliderOpacity.value);
                model.traverse(c => { if (c.isMesh) c.material.opacity = alpha; });
            };

            sliderRotation.oninput = () => {
                model.rotation.y = parseFloat(sliderRotation.value);
                updateModelPosition();
            };

            btnP1.onclick = (e) => {
                e.stopPropagation();
                if(reticle.visible) {
                    p1_real = new THREE.Vector3().setFromMatrixPosition(reticle.matrix);
                    updateModelPosition();
                    model.visible = true;
                    btnP1.style.display = 'none';
                    controlsContainer.style.display = 'flex';
                    statusText.innerText = "Regola rotazione e conferma";
                }
            };

            btnConfirm.onclick = (e) => {
                e.stopPropagation();
                rowRotation.style.display = 'none';
                btnConfirm.style.display = 'none';
                statusText.innerText = "Allineamento fissato";
            };

            // Listener globale con filtro per evitare click-through
            window.addEventListener('click', onSelect);
            renderer.setAnimationLoop(render);
        }

        function updateModelPosition() {
            if (!p1_real) return;
            const offset = p1_digital.clone().applyQuaternion(model.quaternion);
            model.position.copy(p1_real).sub(offset);
        }

        function onSelect(event) {
            // FIX: Se il click avviene su un pulsante o un'area UI, interrompi la selezione 3D
            if (event.target.tagName === 'BUTTON' || event.target.closest('.slider-card') || event.target.closest('#info-popup')) {
                return;
            }

            if (!model || !model.visible) return;

            const mouse = new THREE.Vector2(
                (event.clientX / window.innerWidth) * 2 - 1,
                -(event.clientY / window.innerHeight) * 2 + 1
            );

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(model.children, true);

            if (intersects.length > 0) {
                const target = intersects[0].object;
                if (selectedObject) resetSelection();
                selectedObject = target;
                if(selectedObject.material.emissive) selectedObject.material.emissive.setHex(0xff0000);
                showPopup(target);
            }
        }

        window.resetSelection = function() {
            if (selectedObject && selectedObject.material.emissive) selectedObject.material.emissive.setHex(0x000000);
            selectedObject = null;
            infoPopup.style.display = 'none';
        }

        function showPopup(obj) {
            document.getElementById('el-name').innerText = obj.name || "Elemento";
            let dataStr = "";
            if(obj.userData) {
                for (const [key, value] of Object.entries(obj.userData)) {
                    if(typeof value !== 'object') dataStr += `<b>${key}:</b> ${value}<br>`;
                }
            }
            document.getElementById('el-data').innerHTML = dataStr || "Nessun metadato.";
            infoPopup.style.display = 'block';
        }

        function render(timestamp, frame) {
            if (frame) {
                const session = renderer.xr.getSession();
                const referenceSpace = renderer.xr.getReferenceSpace();
                if (!hitTestSourceRequested) {
                    session.requestReferenceSpace('viewer').then(refSpace => {
                        session.requestHitTestSource({ space: refSpace }).then(source => hitTestSource = source);
                    });
                    hitTestSourceRequested = true;
                }
                if (hitTestSource) {
                    const results = frame.getHitTestResults(hitTestSource);
                    if (results.length > 0) {
                        reticle.visible = true;
                        reticle.matrix.fromArray(results[0].getPose(referenceSpace).transform.matrix);
                    } else {
                        reticle.visible = false;
                    }
                }
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
