<!DOCTYPE html>
<html lang="it">
<head>
    <title>AR BIM Alignment - S26 Ultra Fix</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background-color: #000; color: white; }
        #status-panel { 
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            width: 85%; text-align: center; z-index: 1000; 
            background: rgba(0,0,0,0.8); padding: 20px; border-radius: 15px;
            border: 1px solid #444;
        }
        #ui-container { position: absolute; bottom: 50px; width: 100%; text-align: center; z-index: 1000; }
        .btn { 
            background: #007bff; color: white; border: none; padding: 20px 40px; 
            border-radius: 50px; font-weight: bold; font-size: 18px; display: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        #error-log { color: #ff5555; font-size: 12px; margin-top: 10px; text-align: left; }
    </style>
</head>
<body>
    <div id="status-panel">
        <div id="status-text">Attendere: Avvio Script...</div>
        <div id="error-log"></div>
    </div>
    
    <div id="ui-container">
        <button id="btn-ar" class="btn">AVVIA REALTÀ AUMENTATA</button>
        <button id="btn-p2" class="btn">FISSA PUNTO 2</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.150.1/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const statusText = document.getElementById('status-text');
        const errorLog = document.getElementById('error-log');
        const btnAR = document.getElementById('btn-ar');
        const btnP2 = document.getElementById('btn-p2');

        function reportError(msg) {
            statusText.innerText = "ERRORE";
            errorLog.innerHTML += "> " + msg + "<br>";
            console.error(msg);
        }

        // Intercettiamo errori globali per vederli sul Samsung
        window.onerror = (m) => reportError("JS: " + m);

        let scene, camera, renderer, model;
        let p1_digital = new THREE.Vector3();
        let p2_digital = new THREE.Vector3();
        let p1_real = new THREE.Vector3(0, 0, 0);

        async function init() {
            try {
                statusText.innerText = "Creazione Scena 3D...";
                
                scene = new THREE.Scene();
                camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 100);
                
                renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setPixelRatio(window.devicePixelRatio);
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.xr.enabled = true;
                document.body.appendChild(renderer.domElement);

                scene.add(new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1));
                scene.add(new THREE.AmbientLight(0x404040));

                statusText.innerText = "Download Modello GLB...";
                const loader = new GLTFLoader();
                
                loader.load('./modello.glb', 
                    (gltf) => {
                        model = gltf.scene;
                        
                        // Analisi punti
                        model.traverse((child) => {
                            if (child.name.includes('QR_CODE1')) child.getWorldPosition(p1_digital);
                            if (child.name.includes('QR_CODE2')) child.getWorldPosition(p2_digital);
                        });

                        scene.add(model);
                        model.visible = false;
                        
                        statusText.innerText = "Modello Caricato! Pronto per AR.";
                        btnAR.style.display = 'inline-block';
                    },
                    (xhr) => {
                        const p = Math.round((xhr.loaded / xhr.total) * 100);
                        statusText.innerText = "Scaricamento: " + p + "%";
                    },
                    (err) => reportError("Caricamento fallito: " + err)
                );

                btnAR.onclick = () => {
                    navigator.xr.requestSession('immersive-ar', { requiredFeatures: ['local-floor'] })
                        .then(onSessionStarted)
                        .catch(err => reportError("Impossibile avviare AR: " + err));
                };

                btnP2.onclick = () => {
                    const p2_real = new THREE.Vector3();
                    camera.getWorldPosition(p2_real);
                    calibrate(p2_real);
                    btnP2.innerText = "ALLINEATO ✅";
                };

            } catch (e) {
                reportError("Crash Init: " + e.message);
            }
        }

        function onSessionStarted(session) {
            renderer.xr.setSession(session);
            btnAR.style.display = 'none';
            btnP2.style.display = 'inline-block';
            statusText.innerText = "Punto 1 impostato. Vai al Punto 2.";
            model.visible = true;
            renderer.setAnimationLoop(() => renderer.render(scene, camera));
        }

        function calibrate(p2_real) {
            const d_dig = p1_digital.distanceTo(p2_digital);
            const d_real = p1_real.distanceTo(p2_real);
            const s = d_real / d_dig;
            model.scale.setScalar(s);

            const v_dig = new THREE.Vector3().subVectors(p2_digital, p1_digital).normalize();
            const v_real = new THREE.Vector3().subVectors(p2_real, p1_real).normalize();
            model.rotation.y = Math.atan2(v_real.x, v_real.z) - Math.atan2(v_dig.x, v_dig.z);

            const offset = p1_digital.clone().multiplyScalar(s).applyQuaternion(model.quaternion);
            model.position.copy(p1_real).sub(offset);
        }

        init();
    </script>
</body>
</html>
