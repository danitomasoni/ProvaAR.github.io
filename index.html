<!DOCTYPE html>
<html lang="it">
<head>
    <title>BIM AR - S26 Ultra Precision</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #ar-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; pointer-events: none; z-index: 10;
        }
        #status-panel { 
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            width: 80%; text-align: center; background: rgba(0,0,0,0.8); 
            color: white; padding: 15px; border-radius: 12px; pointer-events: none;
        }
        #ui-container { 
            position: absolute; bottom: 60px; width: 100%; text-align: center; 
            pointer-events: none;
        }
        .btn-ui { 
            background: #28a745; color: white; border: 2px solid white; 
            padding: 20px 30px; border-radius: 15px; font-weight: bold; 
            font-size: 18px; pointer-events: auto; /* IMPORTANTE */
            display: inline-block; margin: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .btn-ui:active { background: #1e7e34; transform: scale(0.95); }
    </style>
</head>
<body>
    <div id="ar-overlay">
        <div id="status-panel">
            <div id="status-text">Inquadra il pavimento e muovi il telefono...</div>
        </div>
        <div id="ui-container">
            <button id="btn-p1" class="btn-ui">FISSA PUNTO 1 (QR1)</button>
            <button id="btn-p2" class="btn-ui" style="display:none;">FISSA PUNTO 2 (QR2)</button>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.150.1/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        let scene, camera, renderer, model, reticle;
        let hitTestSource = null;
        let hitTestSourceRequested = false;
        
        let p1_digital = new THREE.Vector3();
        let p2_digital = new THREE.Vector3();
        let p1_real = null, p2_real = null;

        const statusText = document.getElementById('status-text');
        const btnP1 = document.getElementById('btn-p1');
        const btnP2 = document.getElementById('btn-p2');
        const overlay = document.getElementById('ar-overlay');

        init();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 100);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            const arButton = ARButton.createButton(renderer, {
                requiredFeatures: ['hit-test'],
                optionalFeatures: ['dom-overlay'],
                domOverlay: { root: overlay }
            });
            document.body.appendChild(arButton);

            scene.add(new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1));

            // Mirino più visibile (Giallo acceso)
            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.08, 0.1, 32).rotateX(-Math.PI / 2),
                new THREE.MeshBasicMaterial({ color: 0xffff00 })
            );
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            new GLTFLoader().load('./modello.glb', (gltf) => {
                model = gltf.scene;
                model.traverse(c => {
                    if (c.name.includes('QR_CODE1')) c.getWorldPosition(p1_digital);
                    if (c.name.includes('QR_CODE2')) c.getWorldPosition(p2_digital);
                });
                model.visible = false;
                scene.add(model);
                statusText.innerText = "Modello Caricato. Clicca START AR";
            });

            renderer.xr.addEventListener('sessionstart', () => {
                overlay.style.display = 'block';
            });

            btnP1.onclick = (e) => {
                e.preventDefault();
                if (reticle.visible) {
                    p1_real = new THREE.Vector3().setFromMatrixPosition(reticle.matrix);
                    btnP1.style.display = 'none';
                    btnP2.style.display = 'inline-block';
                    statusText.innerText = "Punto 1 Salvato! Vai al QR 2";
                } else {
                    statusText.innerText = "ERRORE: Pavimento non rilevato. Muovi il telefono!";
                }
            };

            btnP2.onclick = (e) => {
                e.preventDefault();
                if (reticle.visible) {
                    p2_real = new THREE.Vector3().setFromMatrixPosition(reticle.matrix);
                    calibrate();
                    btnP2.style.display = 'none';
                    statusText.innerText = "ALLINEATO CON SUCCESSO!";
                }
            };

            renderer.setAnimationLoop(render);
        }

        function calibrate() {
            const d_dig = p1_digital.distanceTo(p2_digital);
            const d_real = p1_real.distanceTo(p2_real);
            const s = d_real / d_dig;
            model.scale.setScalar(s);

            const v_dig = new THREE.Vector3().subVectors(p2_digital, p1_digital).normalize();
            const v_real = new THREE.Vector3().subVectors(p2_real, p1_real).normalize();
            model.rotation.y = Math.atan2(v_real.x, v_real.z) - Math.atan2(v_dig.x, v_dig.z);

            const offset = p1_digital.clone().multiplyScalar(s).applyQuaternion(model.quaternion);
            model.position.copy(p1_real).sub(offset);
            model.visible = true;
        }

        function render(timestamp, frame) {
            if (frame) {
                const session = renderer.xr.getSession();
                const referenceSpace = renderer.xr.getReferenceSpace();
                if (!hitTestSourceRequested) {
                    session.requestReferenceSpace('viewer').then(refSpace => {
                        session.requestHitTestSource({ space: refSpace }).then(source => hitTestSource = source);
                    });
                    hitTestSourceRequested = true;
                }
                if (hitTestSource) {
                    const hitTestResults = frame.getHitTestResults(hitTestSource);
                    if (hitTestResults.length > 0) {
                        const hit = hitTestResults[0];
                        reticle.visible = true;
                        reticle.matrix.fromArray(hit.getPose(referenceSpace).transform.matrix);
                        if(p1_real == null) statusText.innerText = "Pavimento trovato! Clicca QR1";
                    } else {
                        reticle.visible = false;
                    }
                }
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
